  <style>
    /* ── CUSTOM PROPERTIES ── */
    :root {
      --bg: #ffffff;
      --text: #111111;
      --text-muted: #777777;
      --text-light: #aaaaaa;
      --border: #e5e5e5;
      --surface: #f5f5f5;
      --dark: #111111;
      --dark-muted: #888888;
      --whatsapp: #25D366;
      --whatsapp-hover: #1ebe5d;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --radius-sm: 6px;
      --radius: 10px;
      --container: 1100px;
      --section-v: 96px;
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    img, svg { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    button { font-family: var(--font); cursor: pointer; border: none; background: none; }

    /* ── LAYOUT ── */
    .container {
      width: 100%;
      max-width: var(--container);
      margin-inline: auto;
      padding-inline: 24px;
    }
    section { padding-block: var(--section-v); }

    /* ── TYPOGRAPHY UTILITIES ── */
    .eyebrow {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }
    .section-header h2 {
      font-size: clamp(26px, 4vw, 38px);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .section-header p {
      font-size: 16px;
      color: var(--text-muted);
      max-width: 480px;
      margin-inline: auto;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 22px;
      border-radius: var(--radius-sm);
      transition: all 0.15s ease;
      white-space: nowrap;
      line-height: 1;
    }
    .btn-whatsapp {
      background: var(--whatsapp);
      color: #fff;
    }
    .btn-whatsapp:hover {
      background: var(--whatsapp-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37,211,102,0.3);
    }
    .btn-outline {
      border: 1.5px solid var(--border);
      color: var(--text-muted);
    }
    .btn-outline:hover { border-color: var(--text); color: var(--text); }

    /* ── NAV ── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .nav.scrolled { border-bottom-color: var(--border); }
    .nav__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 24px;
    }
    .nav__logo {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.04em;
      flex-shrink: 0;
    }
    .nav__links {
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .nav__links a:not(.btn) {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      transition: color 0.15s;
    }
    .nav__links a:not(.btn):hover { color: var(--text); }
    .nav__cta { font-size: 13px; padding: 9px 16px; }
    .nav__burger {
      display: none;
      flex-direction: column;
      gap: 5px;
      padding: 4px;
    }
    .nav__burger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: all 0.2s;
    }

    @media (max-width: 767px) {
      .nav__links {
        display: none;
        position: absolute;
        top: 64px;
        left: 0;
        right: 0;
        background: #fff;
        border-bottom: 1px solid var(--border);
        flex-direction: column;
        align-items: flex-start;
        padding: 16px 24px 24px;
        gap: 16px;
      }
      .nav__links.open { display: flex; }
      .nav__burger { display: flex; }
    }

    /* ── HERO ── */
    .hero { padding-block: 80px 64px; text-align: center; }
    .hero__inner { display: flex; flex-direction: column; align-items: center; }
    .hero__title {
      font-size: clamp(48px, 8vw, 88px);
      font-weight: 800;
      letter-spacing: -0.05em;
      line-height: 1.0;
      margin-bottom: 20px;
    }
    .hero__sub {
      font-size: clamp(15px, 2vw, 18px);
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .hero__ctas {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 64px;
    }
    .hero__services {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 720px;
    }
    .hero__service-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 20px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .hero__service-card:hover {
      border-color: #bbb;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .hero__service-card i { width: 22px; height: 22px; color: var(--text); }
    .hero__service-card span { font-size: 12px; font-weight: 600; color: var(--text); }
    .hero__service-card--empty { border-style: dashed; border-color: #eee; background: var(--surface); }

    @media (max-width: 767px) {
      .hero__services { grid-template-columns: repeat(2, 1fr); max-width: 100%; }
      .hero__service-card--empty { display: none; }
    }
  </style>
</head>
