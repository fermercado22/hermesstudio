services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - backend_data:/app/data
    expose:
      - "3001"

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    build: ./nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  backend_data:
